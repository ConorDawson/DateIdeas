
<!DOCTYPE html>
<html>
<head>
  <title>List</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <h1 id="title"></h1>

  <input id="ideaTitle" placeholder="Idea title">
  <input id="ideaDesc" placeholder="Idea description">
  <button onclick="addNewIdea()">Add Idea</button>

  <div id="ideas"></div>

  <script type="module">
import { renderNavbar } from "../js/navbar.js";

document.body.prepend(renderNavbar());

    window.addEventListener("DOMContentLoaded", async () => {

      const { addIdea, getIdeas, deleteIdea, editIdea } =
        await import("../js/idea.js");

      const ideasEl = document.getElementById("ideas");
      const titleEl = document.getElementById("title");

      // ✅ GLOBAL ACCESS (fixes your error)
      window.currentListName = localStorage.getItem("currentList");

      const listName = window.currentListName;

      titleEl.innerText = listName || "No list selected";

      // -------------------------
      // LOAD IDEAS
      // -------------------------
      async function loadIdeas() {
        const { data, error } = await getIdeas(listName);

        console.log("IDEAS:", data, error);

        ideasEl.innerHTML = "";

        if (!data || data.length === 0) {
          ideasEl.innerHTML = "<p>No ideas yet</p>";
          return;
        }

        data.forEach(i => {
          ideasEl.innerHTML += `
            <div style="border:1px solid #ddd; padding:10px; margin:10px;">
              <h3>${i.ideaTitle}</h3>
              <p>${i.ideaDescription}</p>

              <button onclick="editIdeaUI('${i.ideaTitle}', '${i.ideaDescription}')">
                Edit
              </button>

              <button onclick="deleteIdeaUI('${i.ideaTitle}')">
                Delete
              </button>
            </div>
          `;
        });
      }

      // -------------------------
      // ADD IDEA
      // -------------------------
      window.addNewIdea = async () => {
        const t = document.getElementById("ideaTitle").value;
        const d = document.getElementById("ideaDesc").value;

        if (!t.trim()) {
          alert("Enter title");
          return;
        }

        await addIdea(listName, t, d);

        document.getElementById("ideaTitle").value = "";
        document.getElementById("ideaDesc").value = "";

        loadIdeas();
      };

      // -------------------------
      // DELETE IDEA
      // -------------------------
      window.deleteIdeaUI = async (title) => {
        await deleteIdea(window.currentListName, title);
        loadIdeas();
      };

      // -------------------------
      // EDIT IDEA
      // -------------------------
      window.editIdeaUI = async (title, desc) => {
        const newTitle = prompt("Edit title:", title);
        const newDesc = prompt("Edit description:", desc);

        if (!newTitle || !newDesc) return;

        await editIdea(
          window.currentListName,
          title,
          newTitle,
          newDesc
        );

        loadIdeas();
      };

      // INIT
      loadIdeas();
    });
  </script>
</body>
</html>
