<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<h1>Your Lists ❤️</h1>

<!-- GLOBAL RANDOM BUTTON -->
<button onclick="randomGlobalIdea()">🎲 Surprise Me</button>

<br><br>

<input id="newListName" placeholder="New list name">
<button onclick="createNewList()">Create List</button>

<div id="lists"></div>

<!-- TOAST (must be above script usage) -->
<div id="toast"></div>

<script type="module">

  import { renderNavbar } from "../js/navbar.js";
  document.body.prepend(renderNavbar());

  window.addEventListener("DOMContentLoaded", async () => {

    // make modules global
    window.listsModule = await import("../js/lists.js");
    window.ideasModule = await import("../js/idea.js");

    const container = document.getElementById("lists");

    // -----------------------
    // TOAST SYSTEM
    // -----------------------
    window.showToast = function (message) {
      const toast = document.getElementById("toast");

      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(window.toastTimeout);

      window.toastTimeout = setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    };

    // -----------------------
    // LOAD LISTS
    // -----------------------
    async function loadLists() {
      const { data } = await window.listsModule.getLists();

      container.innerHTML = "";

      (data || []).forEach(list => {
        container.innerHTML += `
          <div>
            <h3>${list.listName}</h3>

            <p id="count-${list.listName}">Loading ideas...</p>

            <button onclick="openList('${list.listName}')">Open</button>
            <button onclick="removeList('${list.listName}')">Delete</button>
            <button onclick="randomIdea('${list.listName}')">🎲 Random</button>
          </div>
        `;
      });

      loadCounts(data || []);
    }

    // -----------------------
    // LOAD IDEA COUNTS
    // -----------------------
    async function loadCounts(lists) {
      for (const list of lists) {
        const { data } = await window.ideasModule.getIdeas(list.listName);

        const el = document.getElementById(`count-${list.listName}`);
        if (el) {
          el.innerText = `${data?.length || 0} ideas`;
        }
      }
    }

    // -----------------------
    // CREATE LIST
    // -----------------------
    window.createNewList = async () => {
      const input = document.getElementById("newListName");
      const name = input.value.trim();

      if (!name) {
        showToast("Enter a list name");
        return;
      }

      await window.listsModule.createList(name);

      input.value = "";
      loadLists();

      showModal("List created 💖");
    };

    // -----------------------
    // DELETE LIST
    // -----------------------
    window.removeList = async (listName) => {
      await window.listsModule.deleteList(listName);

      loadLists();

      showModal("List deleted 🗑️");
    };

    // -----------------------
    // OPEN LIST
    // -----------------------
    window.openList = (name) => {
      localStorage.setItem("currentList", name);
      window.location.href = "list.html";
    };

    // -----------------------
    // RANDOM IDEA (LIST)
    // -----------------------
    window.randomIdea = async (listName) => {
      const { data } = await window.ideasModule.getIdeas(listName);

      if (!data || data.length === 0) {
        showToast("No ideas in this list!");
        return;
      }

      const random = data[Math.floor(Math.random() * data.length)];

      showModal(`💡 ${random.ideaTitle} — ${random.ideaDescription}`);
    };

    // -----------------------
    // RANDOM GLOBAL IDEA
    // -----------------------
    window.randomGlobalIdea = async () => {
      const lists = await window.listsModule.getLists();

      let allIdeas = [];

      for (const list of lists.data || []) {
        const { data } = await window.ideasModule.getIdeas(list.listName);
        allIdeas = allIdeas.concat(data || []);
      }

      if (allIdeas.length === 0) {
        showModal("No ideas anywhere yet!");
        return;
      }

      const random = allIdeas[Math.floor(Math.random() * allIdeas.length)];

      showModal(`💖 ${random.ideaTitle} — ${random.ideaDescription}`);
    };

    // INIT
    loadLists();

  });

  window.showModal = function (message) {
  const overlay = document.getElementById("modalOverlay");
  const text = document.getElementById("modalMessage");

  text.textContent = message;
  overlay.classList.remove("hidden");
};

window.closeModal = function () {
  document.getElementById("modalOverlay").classList.add("hidden");
};

</script>
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">Acknowledge</button>
  </div>
</div>
</body>
</html>
